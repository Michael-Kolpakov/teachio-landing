<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Схема архітектури системи дистанційного навчання</title>
  <desc id="desc">Схематичне зображення взаємодії між клієнтським застосунком, REST API, бізнес-логікою та базою даних.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b7285" />
      <stop offset="100%" stop-color="#156b86" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#f8f7f4" />
  <rect x="50" y="50" width="1100" height="530" rx="24" fill="url(#bg)" opacity="0.1" />

  <g font-family="Segoe UI, Tahoma, sans-serif" fill="#1f2933">
    <rect x="110" y="190" width="230" height="120" rx="16" fill="#ffffff" stroke="#0b7285" stroke-width="3" />
    <text x="225" y="250" text-anchor="middle" font-size="34" font-weight="700">UI Client</text>

    <rect x="430" y="190" width="340" height="120" rx="16" fill="#ffffff" stroke="#0b7285" stroke-width="3" />
    <text x="600" y="242" text-anchor="middle" font-size="34" font-weight="700">REST API</text>
    <text x="600" y="276" text-anchor="middle" font-size="24">ASP.NET Core + MediatR</text>

    <rect x="860" y="190" width="230" height="120" rx="16" fill="#ffffff" stroke="#0b7285" stroke-width="3" />
    <text x="975" y="242" text-anchor="middle" font-size="34" font-weight="700">MS SQL</text>
    <text x="975" y="276" text-anchor="middle" font-size="24">Entity Framework Core</text>

    <line x1="340" y1="250" x2="430" y2="250" stroke="#0b7285" stroke-width="6" marker-end="url(#arrow)" />
    <line x1="770" y1="250" x2="860" y2="250" stroke="#0b7285" stroke-width="6" marker-end="url(#arrow)" />
  </g>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#0b7285" />
    </marker>
  </defs>
</svg>
