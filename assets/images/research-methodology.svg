<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Методологія дослідження</title>
  <desc id="desc">Поетапна методологія: аналіз проблеми, проєктування архітектури, розробка, тестування та оцінювання результатів.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5fbff"/>
      <stop offset="100%" stop-color="#e8f2ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#88a6c7" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="640" fill="url(#bg)"/>
  <path d="M0 520 C 260 460, 560 620, 1200 500 L1200 640 L0 640 Z" fill="#dbe9ff"/>

  <g font-family="Segoe UI, Tahoma, sans-serif" fill="#1a2f4a">
    <text x="70" y="85" font-size="42" font-weight="700">Методологія дослідження</text>
    <text x="70" y="122" font-size="22" fill="#48607a">Від постановки проблеми до перевірки якості розробленої системи</text>
  </g>

  <g filter="url(#shadow)" font-family="Segoe UI, Tahoma, sans-serif">
    <rect x="70" y="180" width="200" height="140" rx="16" fill="url(#card)" stroke="#bcd1ea"/>
    <text x="92" y="220" font-size="18" font-weight="700" fill="#173b63">1. Аналіз предметної</text>
    <text x="92" y="245" font-size="18" font-weight="700" fill="#173b63">області</text>
    <text x="92" y="275" font-size="14" fill="#3f5873">Визначення ролей користувачів,</text>
    <text x="92" y="296" font-size="14" fill="#3f5873">сценаріїв та бізнес-вимог.</text>

    <rect x="295" y="180" width="200" height="140" rx="16" fill="url(#card)" stroke="#bcd1ea"/>
    <text x="317" y="220" font-size="18" font-weight="700" fill="#173b63">2. Архітектурне</text>
    <text x="317" y="245" font-size="18" font-weight="700" fill="#173b63">проєктування</text>
    <text x="317" y="275" font-size="14" fill="#3f5873">N-Layer структура, API-контракти,</text>
    <text x="317" y="296" font-size="14" fill="#3f5873">модель даних та інтеграції.</text>

    <rect x="520" y="180" width="200" height="140" rx="16" fill="url(#card)" stroke="#bcd1ea"/>
    <text x="542" y="220" font-size="18" font-weight="700" fill="#173b63">3. Реалізація</text>
    <text x="542" y="245" font-size="18" font-weight="700" fill="#173b63">функціоналу</text>
    <text x="542" y="275" font-size="14" fill="#3f5873">ASP.NET Core, MediatR,</text>
    <text x="542" y="296" font-size="14" fill="#3f5873">Entity Framework Core.</text>

    <rect x="745" y="180" width="200" height="140" rx="16" fill="url(#card)" stroke="#bcd1ea"/>
    <text x="767" y="220" font-size="18" font-weight="700" fill="#173b63">4. Тестування і</text>
    <text x="767" y="245" font-size="18" font-weight="700" fill="#173b63">верифікація</text>
    <text x="767" y="275" font-size="14" fill="#3f5873">Перевірка стабільності API,</text>
    <text x="767" y="296" font-size="14" fill="#3f5873">логування та обробки помилок.</text>

    <rect x="970" y="180" width="160" height="140" rx="16" fill="url(#card)" stroke="#bcd1ea"/>
    <text x="992" y="220" font-size="18" font-weight="700" fill="#173b63">5. Оцінка</text>
    <text x="992" y="245" font-size="18" font-weight="700" fill="#173b63">результатів</text>
    <text x="992" y="275" font-size="14" fill="#3f5873">Порівняння з цілями</text>
    <text x="992" y="296" font-size="14" fill="#3f5873">та вимогами.</text>
  </g>

  <g stroke="#3e8ed8" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M270 250 H295"/>
    <path d="M495 250 H520"/>
    <path d="M720 250 H745"/>
    <path d="M945 250 H970"/>
  </g>

  <g fill="#3e8ed8">
    <polygon points="287,243 298,250 287,257"/>
    <polygon points="512,243 523,250 512,257"/>
    <polygon points="737,243 748,250 737,257"/>
    <polygon points="962,243 973,250 962,257"/>
  </g>

  <g font-family="Segoe UI, Tahoma, sans-serif" fill="#26496a">
    <text x="70" y="390" font-size="22" font-weight="700">Ключові артефакти</text>
    <text x="70" y="425" font-size="18">• UML-діаграми та модель даних</text>
    <text x="70" y="455" font-size="18">• Контракти REST API та сценарії взаємодії</text>
    <text x="70" y="485" font-size="18">• Логи, тест-кейси та критерії приймання</text>
  </g>
</svg>
